name: validate
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Persona/deployment identity leak gate
        run: python3 scripts/validate_public.py
      - name: Run starter wiki lint on repo root
        run: python3 scripts/lint_wiki.py .
      - name: Secret-value pattern gate
        run: |
          if grep -RInE '(api[_-]?key|token|secret)\s*[:=]\s*[A-Za-z0-9+/]{20,}' . --exclude-dir=.git; then
            echo "possible secret value detected" >&2
            exit 1
          fi
